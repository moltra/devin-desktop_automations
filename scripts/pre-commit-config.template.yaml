# Devin Pre-Commit Configuration Template
#
# Copy this file to your project root as .pre-commit-config.yaml
# Then run: pre-commit install
#
# IMPORTANT: Choose ONE of the two strategies below, not both:
#
#   Strategy A (standalone hooks): Use the ruff/ruff-format/bandit
#     hooks below. Simple, fast, idiomatic pre-commit. Does NOT run
#     black or isort (ruff handles both lint and format).
#
#   Strategy B (aggregate devin-review script): Comment out the
#     standalone ruff/ruff-format/bandit hooks below and uncomment
#     the devin-review local hook at the bottom. The script runs
#     ruff + black + isort + bandit in one pass. Use this if your
#     project enforces black/isort separately from ruff.
#
# Running both strategies doubles the work (ruff/bandit run twice)
# and can produce conflicting results (ruff-format vs black --check).
#
# Requires pre-commit >= 4.0 for the `pre-commit` stage name.

repos:
  # Standard hygiene hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements

  # --- Strategy A: standalone hooks (default) ---
  # Ruff: fast linter + formatter (handles isort rules too)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Bandit: security linter
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-q"]
        additional_dependencies: ["bandit[toml]"]

  # --- Strategy B: aggregate devin-review script (alternative) ---
  # Uncomment to use. Remember to comment out the ruff/ruff-format/
  # bandit hooks above to avoid double execution.
  #
  # NOTE: pre-commit does NOT expand `~` in entry (it uses shlex,
  # not a shell). Use an absolute path. Replace /home/mark with your
  # actual home directory if copying to another machine.
  #
  # - repo: local
  #   hooks:
  #     - id: devin-review
  #       name: Devin Code Review
  #       entry: python3 /home/mark/.config/devin/scripts/review_code.py
  #       language: system
  #       pass_filenames: true
  #       stages: [pre-commit]
